<style>
    body { font-family: sans-serif; margin: 40px; background-color: #f4f4f9; }
    table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; box-shadow: 0 0 20px rgba(0,0,0,0.1); }
    th, td { padding: 15px; text-align: left; border-bottom: 1px solid #ddd; }
    th { background-color: #007bff; color: white; }
    tr:hover { background-color: #f1f1f1; }
    .status { color: green; font-weight: bold; }
</style>

<h1>📦 Office Inventory Dashboard</h1>
<table>
    <thead>
        <tr>
            <th>Item Name</th>
            <th>Quantity</th>
            <th>Price Each</th>
            <th>Status</th>
        </tr>
    </thead>
        <tbody>
    {% for item in items %}
    <tr>
        <td><strong>{{ item.name }}</strong></td>
        <td>{{ item.quantity }}</td>
        <td>${{ item.price }}</td>
        <td class="status">In Stock</td>
        
        <td>
            <a href="/items/edit/{{ item.id }}/">Edit</a> | 
            <a href="/items/delete/{{ item.id }}/" style="color:red;">Delete</a>
        </td>
    </tr>
    {% endfor %}
</tbody>
</table>
